groups:
- name: scavenger_alerts
  interval: 1m
  rules:
  - alert: HighErrorRate
    expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
    for: 5m
    labels:
      severity: critical
    annotations:
      summary: "High error rate detected"
      description: "Error rate is above 5% for {{ $labels.instance }}"

  - alert: PodRestartingTooOften
    expr: rate(kube_pod_container_status_restarts_total[15m]) > 0
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "Pod {{ $labels.pod }} is restarting frequently"
      description: "Pod has restarted {{ $value }} times in 15m"

  - alert: HighMemoryUsage
    expr: container_memory_usage_bytes / container_spec_memory_limit_bytes > 0.8
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "High memory usage detected"
      description: "Memory usage is above 80% for {{ $labels.container }}"

  - alert: HighCPUUsage
    expr: rate(container_cpu_usage_seconds_total[5m]) > 0.8
    for: 10m
    labels:
      severity: warning
    annotations:
      summary: "High CPU usage detected"
      description: "CPU usage is above 80% for {{ $labels.container }}"

  - alert: DatabaseConnectionPoolExhausted
    expr: pg_stat_activity_count > pg_settings_max_connections * 0.8
    for: 5m
    labels:
      severity: critical
    annotations:
      summary: "Database connection pool near exhaustion"
      description: "{{ $value }} of {{ $labels.max_connections }} connections in use"

  - alert: DiskSpaceLow
    expr: node_filesystem_avail_bytes / node_filesystem_size_bytes < 0.1
    for: 10m
    labels:
      severity: warning
    annotations:
      summary: "Low disk space on {{ $labels.device }}"
      description: "Less than 10% disk space available"

  - alert: ServiceUnavailable
    expr: up{job="scavenger-backend"} == 0
    for: 2m
    labels:
      severity: critical
    annotations:
      summary: "Service is down"
      description: "{{ $labels.instance }} has been down for more than 2 minutes"

  - alert: HighLatency
    expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 1
    for: 10m
    labels:
      severity: warning
    annotations:
      summary: "High API latency detected"
      description: "95th percentile latency is above 1s for {{ $labels.instance }}"

  - alert: AnomalyDetected
    expr: abs(rate(http_requests_total[5m]) - rate(http_requests_total[5m] offset 1h)) > 2 * stddev_over_time(rate(http_requests_total[5m])[1h:5m])
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "Anomaly detected in request rate"
      description: "Request rate deviates significantly from baseline"

  - alert: SLOViolation
    expr: (1 - rate(http_requests_total{status="200"}[5m]) / rate(http_requests_total[5m])) > 0.01
    for: 10m
    labels:
      severity: warning
    annotations:
      summary: "SLO violation - availability below 99%"
      description: "Current availability: {{ $value | humanizePercentage }}"
