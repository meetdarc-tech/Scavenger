# Prometheus monitoring dashboard configuration

apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-dashboards
  namespace: monitoring
data:
  scavenger-overview.json: |
    {
      "dashboard": {
        "title": "Scavenger Overview",
        "panels": [
          {
            "title": "Request Rate",
            "targets": [{"expr": "rate(http_requests_total[5m])"}]
          },
          {
            "title": "Error Rate",
            "targets": [{"expr": "rate(http_requests_total{status=~\"5..\"}[5m])"}]
          },
          {
            "title": "P95 Latency",
            "targets": [{"expr": "histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m]))"}]
          },
          {
            "title": "Active Connections",
            "targets": [{"expr": "up{job=\"scavenger\"}"}]
          },
          {
            "title": "Memory Usage",
            "targets": [{"expr": "container_memory_usage_bytes"}]
          },
          {
            "title": "CPU Usage",
            "targets": [{"expr": "rate(container_cpu_usage_seconds_total[5m])"}]
          }
        ]
      }
    }

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-recording-rules
  namespace: monitoring
data:
  recording_rules.yml: |
    groups:
    - name: scavenger_recording
      interval: 1m
      rules:
      - record: job:http_requests:rate1m
        expr: rate(http_requests_total[1m])
      
      - record: job:http_errors:rate1m
        expr: rate(http_requests_total{status=~"5.."}[1m])
      
      - record: job:http_latency:p95
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m]))
      
      - record: job:container_memory_percent
        expr: (container_memory_usage_bytes / container_spec_memory_limit_bytes) * 100
      
      - record: job:container_cpu_percent
        expr: rate(container_cpu_usage_seconds_total[5m]) * 100
