filebeat.inputs:
  # Backend (Rust/Actix-web) logs
  - type: log
    id: backend-logs
    enabled: true
    paths:
      - /var/log/app/backend/*.log
    fields:
      service: backend
      environment: ${ENVIRONMENT:development}
    fields_under_root: true
    json.keys_under_root: true
    json.add_error_key: true
    multiline.pattern: '^\d{4}-\d{2}-\d{2}'
    multiline.negate: true
    multiline.match: after

  # Indexer (TypeScript/Node.js) logs
  - type: log
    id: indexer-logs
    enabled: true
    paths:
      - /var/log/app/indexer/*.log
    fields:
      service: indexer
      environment: ${ENVIRONMENT:development}
    fields_under_root: true
    json.keys_under_root: true
    json.add_error_key: true

  # Docker container logs
  - type: container
    id: docker-logs
    enabled: true
    paths:
      - /var/lib/docker/containers/*/*.log
    processors:
      - add_docker_metadata:
          host: "unix:///var/run/docker.sock"

processors:
  - add_host_metadata: ~
  - add_cloud_metadata: ~
  - drop_fields:
      fields: ["agent.ephemeral_id", "agent.hostname", "agent.id", "agent.version"]
      ignore_missing: true

output.logstash:
  hosts: ["logstash:5044"]
  bulk_max_size: 2048

logging.level: warning
logging.to_files: false
