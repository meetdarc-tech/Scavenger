# Jaeger Configuration for distributed tracing

server:
  http_server_port: 16686
  grpc_server_port: 16685

memory:
  max_traces: 10000

collector:
  port: 14269
  http_server_port: 14268
  grpc_server_port: 14250

storage:
  type: badger
  badger:
    ephemeral: false
    directory_value: /badger/data
    directory_key: /badger/key

sampling:
  type: const
  param: 1

logging:
  level: info
