DistributionConfigWithTags:
  DistributionConfig:
    CallerReference: scavenger-cdn-2026-05-29
    Comment: "Scavenger CloudFront distribution for static assets and API traffic"
    Enabled: true
    DefaultRootObject: index.html
    Origins:
      - DomainName: scavenger-app.s3.amazonaws.com
        Id: s3-origin
        S3OriginConfig:
          OriginAccessIdentity: origin-access-identity/cloudfront/ABCDEFG1234567
    DefaultCacheBehavior:
      TargetOriginId: s3-origin
      ViewerProtocolPolicy: redirect-to-https
      AllowedMethods:
        - GET
        - HEAD
        - OPTIONS
      CachedMethods:
        - GET
        - HEAD
      Compress: true
      CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
    CacheBehaviors:
      - PathPattern: /api/*
        TargetOriginId: s3-origin
        ViewerProtocolPolicy: https-only
        AllowedMethods:
          - GET
          - HEAD
          - OPTIONS
          - PUT
          - POST
          - PATCH
          - DELETE
        CachedMethods:
          - GET
          - HEAD
        Compress: true
        CachePolicyId: 413fd8e3-8d15-4e09-bdff-1f6059fbe0d5
        OriginRequestPolicyId: 88a5eaf4-2fd4-4709-b370-b4c650ea3fcf
      - PathPattern: /static/*
        TargetOriginId: s3-origin
        ViewerProtocolPolicy: https-only
        AllowedMethods:
          - GET
          - HEAD
        CachedMethods:
          - GET
          - HEAD
        Compress: true
        CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
    CustomErrorResponses:
      - ErrorCode: 404
        ResponseCode: 200
        ResponsePagePath: /index.html
        ErrorCachingMinTTL: 300
      - ErrorCode: 403
        ResponseCode: 200
        ResponsePagePath: /index.html
        ErrorCachingMinTTL: 300
    HttpVersion: http2and3
    IsIPV6Enabled: true
    PriceClass: PriceClass_100
    ViewerCertificate:
      ACMCertificateArn: arn:aws:acm:us-east-1:123456789012:certificate/12345678-1234-1234-1234-123456789012
      MinimumProtocolVersion: TLSv1.2_2021
      SSLSupportMethod: sni-only
    Aliases:
      - scavenger.example.com
      - www.scavenger.example.com
  Tags:
    Items:
      - Key: Name
        Value: scavenger-cdn
      - Key: Project
        Value: scavenger
