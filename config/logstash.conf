input {
  # Filebeat input
  beats {
    port => 5044
  }

  # Direct UDP input (legacy / local dev)
  udp {
    port => 5000
    codec => json
  }
}

filter {
  # ── Parse timestamp ──────────────────────────────────────────────────────────
  date {
    match => ["timestamp", "ISO8601"]
    target => "@timestamp"
    remove_field => ["timestamp"]
  }

  # ── Backend (Rust) service parser ────────────────────────────────────────────
  if [service] == "backend" {
    # Parse tracing-subscriber JSON format
    if [fields][service] == "backend" or [service] == "backend" {
      mutate {
        rename => { "[fields][correlation_id]" => "correlation_id" }
        rename => { "[fields][request_id]"     => "request_id" }
      }
    }

    # Classify log level
    if [level] == "ERROR" or [level] == "error" {
      mutate { add_tag => ["error"] }
    }
  }

  # ── Indexer (TypeScript) service parser ──────────────────────────────────────
  if [service] == "indexer" {
    # Normalize pino/winston level names
    if [level] == 10 { mutate { replace => { "level" => "TRACE" } } }
    if [level] == 20 { mutate { replace => { "level" => "DEBUG" } } }
    if [level] == 30 { mutate { replace => { "level" => "INFO"  } } }
    if [level] == 40 { mutate { replace => { "level" => "WARN"  } } }
    if [level] == 50 { mutate { replace => { "level" => "ERROR" } } }
    if [level] == 60 { mutate { replace => { "level" => "FATAL" } } }

    if [level] == "ERROR" or [level] == "FATAL" {
      mutate { add_tag => ["error"] }
    }
  }

  # ── Docker container logs ────────────────────────────────────────────────────
  if [container][name] {
    mutate {
      add_field => { "service" => "%{[container][name]}" }
    }
  }

  # ── Correlation ID propagation ───────────────────────────────────────────────
  if [correlation_id] {
    mutate {
      add_field => { "[@metadata][correlation_id]" => "%{correlation_id}" }
    }
  }

  # ── Route to index by service ────────────────────────────────────────────────
  if [service] {
    mutate {
      add_field => { "[@metadata][index_name]" => "scavngr-%{service}-%{+YYYY.MM.dd}" }
    }
  } else {
    mutate {
      add_field => { "[@metadata][index_name]" => "scavngr-app-%{+YYYY.MM.dd}" }
    }
  }

  # ── Drop noisy health-check logs ─────────────────────────────────────────────
  if [message] =~ /GET \/health/ {
    drop {}
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "%{[@metadata][index_name]}"
  }

  # Debug output in development
  if [@metadata][debug] {
    stdout { codec => rubydebug }
  }
}
