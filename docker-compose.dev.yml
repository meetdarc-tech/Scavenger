version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: scavenger
      POSTGRES_USER: scavenger_user
      POSTGRES_PASSWORD: scavenger_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scavenger_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.multistage
    environment:
      - RUST_LOG=info
      - DATABASE_URL=postgresql://scavenger_user:scavenger_pass@postgres:5432/scavenger
      - REDIS_URL=redis://redis:6379
      - S3_BUCKET=scavenger-local
      - AWS_REGION=us-east-1
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  indexer:
    build:
      context: .
      dockerfile: indexer/Dockerfile.multistage
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://scavenger_user:scavenger_pass@postgres:5432/scavenger
      - REDIS_URL=redis://redis:6379
      - SOROBAN_RPC_URL=http://stellar:11626/soroban/rpc
      - CONTRACT_ID=${CONTRACT_ID}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  stellar:
    image: stellar/quickstart:latest
    environment:
      - STELLAR_NETWORK_PASSPHRASE=Test SDF Network ; September 2015
      - SOROBAN_RPC_HOST=0.0.0.0
    ports:
      - "8000:8000"
      - "11626:11626"
      - "11627:11627"
    volumes:
      - stellar_data:/opt/stellar/data

volumes:
  postgres_data:
  redis_data:
  stellar_data:

networks:
  default:
    name: scavenger_network
