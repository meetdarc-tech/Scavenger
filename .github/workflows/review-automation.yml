name: Review Automation

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

jobs:
  pr-checks:
    name: PR Validation
    runs-on: ubuntu-latest
    steps:
      - name: Check PR description and title
        uses: actions/github-script@v7
        with:
          script: |
            const { title, body, changed_files } = context.payload.pull_request;

            // Validate title follows conventional commits
            const ccPattern = /^(feat|fix|docs|chore|refactor|test|ci|perf|style|build|revert)(\(.+\))?!?:\s.+/;
            if (!ccPattern.test(title)) {
              core.setFailed(
                `PR title does not follow Conventional Commits format.\n` +
                `Expected: <type>(<scope>): <description>\n` +
                `Examples: feat(contract): add batch submit, fix(frontend): handle null participant\n` +
                `Got: "${title}"`
              );
            }

            // Fail if description is empty
            if (!body || body.trim().length === 0) {
              core.setFailed('PR description is empty. Please fill in the PR template.');
            }

            // Warn (not fail) if no issue linked
            if (body && !/closes\s+#\d+|fixes\s+#\d+|resolves\s+#\d+/i.test(body)) {
              core.warning('No linked issue found in PR description. Consider adding "Closes #<issue>" if applicable.');
            }

  size-label:
    name: PR Size Check
    runs-on: ubuntu-latest
    steps:
      - name: Warn on large PR
        if: github.event.pull_request.changed_files > 500
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `## ⚠️ Large PR detected\n\nThis PR changes **${{ github.event.pull_request.changed_files }} files**, which makes it harder to review thoroughly.\n\nPlease consider splitting it into smaller, focused PRs. See [CODE_REVIEW_GUIDE.md](docs/CODE_REVIEW_GUIDE.md) for guidance.`
            });
