name: Security Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  contract-security-tests:
    name: Contract Security Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: stellar-contract
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: stellar-contract

      - name: Run security tests
        run: cargo test --test security_testing

      - name: Run fuzz tests (if available)
        run: cargo test fuzz
        continue-on-error: true

  security-test-suite:
    name: TypeScript Security Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: security-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: security-tests/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run security test suite
        run: npm test
        env:
          API_URL: ${{ vars.API_URL || 'http://localhost:3000/api' }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-test-results
          path: security-tests/test-results/
          if-no-files-found: ignore

  security-report:
    name: Security Report
    runs-on: ubuntu-latest
    needs: [contract-security-tests, security-test-suite]
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## Security Tests Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Contract Security Tests | ${{ needs.contract-security-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| TypeScript Security Tests | ${{ needs.security-test-suite.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ needs.contract-security-tests.result }}" == "failure" || "${{ needs.security-test-suite.result }}" == "failure" ]]; then
            echo "❌ One or more security test jobs failed." >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "✅ All security tests passed." >> $GITHUB_STEP_SUMMARY
          fi
