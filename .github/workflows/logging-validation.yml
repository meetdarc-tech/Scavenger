name: Logging Stack Validation

on:
  push:
    branches: [main, "feature/**"]
    paths:
      - "docker-compose.logging.yml"
      - "config/filebeat.yml"
      - "config/logstash.conf"
      - "config/ilm-policy.json"
      - "indexer/src/utils/logger.ts"
      - "backend/src/main.rs"
  pull_request:
    paths:
      - "docker-compose.logging.yml"
      - "config/filebeat.yml"
      - "config/logstash.conf"
      - "config/ilm-policy.json"
      - "indexer/src/utils/logger.ts"
      - "backend/src/main.rs"

jobs:
  validate-configs:
    name: Validate Logging Configs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose.logging.yml
        run: docker compose -f docker-compose.logging.yml config --quiet

      - name: Validate ILM policy JSON
        run: python3 -c "import json,sys; json.load(open('config/ilm-policy.json'))" && echo "ILM policy JSON is valid"

      - name: Validate Filebeat config (YAML)
        run: python3 -c "import yaml,sys; yaml.safe_load(open('config/filebeat.yml'))" && echo "Filebeat config YAML is valid"

  validate-logger:
    name: Validate Indexer Logger
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: indexer
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: indexer/package-lock.json

      - run: npm ci

      - name: Type-check logger
        run: npx tsc --noEmit

  validate-backend-logging:
    name: Validate Backend Logging
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Check backend compiles with tracing
        run: cargo check
