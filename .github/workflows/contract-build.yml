name: Contract Build & Test

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'stellar-contract/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'stellar-contract/**'

jobs:
  contract-build:
    name: Build Smart Contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: rustup target add wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cd stellar-contract && cargo build --target wasm32-unknown-unknown --release
      - uses: actions/upload-artifact@v3
        with:
          name: wasm-contract
          path: stellar-contract/target/wasm32-unknown-unknown/release/*.wasm

  contract-test:
    name: Contract Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cd stellar-contract && cargo test --lib --verbose
      - run: cd stellar-contract && cargo test --test '*' --verbose

  contract-benchmarks:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cd stellar-contract && cargo bench --no-run
