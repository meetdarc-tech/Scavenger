name: Deployment

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build and Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Contract
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          rustup target add wasm32-unknown-unknown
          cd stellar-contract && cargo build --target wasm32-unknown-unknown --release

      - name: Build Backend
        run: |
          cd backend && cargo build --release

      - name: Build Frontend
        run: |
          cd frontend && npm ci && npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Push to ECR
        run: |
          aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
          docker build -t scavenger-backend:latest -f backend/Dockerfile backend/
          docker tag scavenger-backend:latest ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/scavenger-backend:latest
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/scavenger-backend:latest

      - name: Deploy to Kubernetes
        run: |
          aws eks update-kubeconfig --name scavenger-cluster --region us-east-1
          kubectl apply -f k8s/deployment.yml
          kubectl rollout status deployment/scavenger-backend -n default

  test-deployment:
    name: Test Deployment
    runs-on: ubuntu-latest
    needs: build-and-deploy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: cd integration-tests && npm ci && npm test
