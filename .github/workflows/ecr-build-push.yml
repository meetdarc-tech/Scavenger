name: Build and Push to ECR

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

jobs:
  build-push:
    name: Build & Push ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # OIDC
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - service: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
          - service: indexer
            context: ./indexer
            dockerfile: ./indexer/Dockerfile
          - service: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CI_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: tag
        run: |
          SHA="sha-$(echo ${{ github.sha }} | cut -c1-7)"
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${{ github.ref_name }}"
            echo "tags=$ECR_REGISTRY/scavenger/${{ matrix.service }}:$VERSION,$ECR_REGISTRY/scavenger/${{ matrix.service }}:$SHA" >> $GITHUB_OUTPUT
          else
            echo "tags=$ECR_REGISTRY/scavenger/${{ matrix.service }}:$SHA,$ECR_REGISTRY/scavenger/${{ matrix.service }}:latest" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.tag.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          provenance: true
          sbom: true

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with Cosign (keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          IMAGE="${ECR_REGISTRY}/scavenger/${{ matrix.service }}@${{ steps.build.outputs.digest }}"
          cosign sign --yes "$IMAGE"

      - name: Run Trivy scan on pushed image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.ECR_REGISTRY }}/scavenger/${{ matrix.service }}@${{ steps.build.outputs.digest }}"
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'

      - name: Upload Trivy results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}

      - name: Create image summary
        run: |
          echo "## ECR Push Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Service:** ${{ matrix.service }}" >> $GITHUB_STEP_SUMMARY
          echo "**Image Tags:** ${{ steps.tag.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** ${{ steps.build.outputs.digest }}" >> $GITHUB_STEP_SUMMARY
          echo "**Signed:** ✓" >> $GITHUB_STEP_SUMMARY

  cleanup-old-images:
    name: Cleanup Old ECR Images
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CI_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Cleanup old images
        run: |
          for service in backend indexer frontend; do
            REPO="scavenger/$service"
            # Keep last 10 images
            aws ecr describe-images --repository-name "$REPO" --query 'sort_by(imageDetails,&imagePushedAt)[:-10].imageIds' --output json | \
            jq -r '.[] | "\(.imageTag // .imageDigest)"' | \
            while read tag; do
              echo "Deleting old image: $REPO:$tag"
              aws ecr batch-delete-image --repository-name "$REPO" --image-ids imageTag="$tag" || true
            done
          done
