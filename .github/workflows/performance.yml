name: Performance Baseline Tracking

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:

jobs:
  contract-benchmarks:
    name: Contract Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: stellar-contract

      - name: Run performance tests
        working-directory: stellar-contract
        run: cargo test --test performance_test -- --nocapture 2>&1 | tee ../performance-results.txt

      - uses: actions/upload-artifact@v4
        with:
          name: contract-performance-results
          path: performance-results.txt

  api-performance:
    name: API Performance
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: ~/.cache/k6
          key: k6-${{ runner.os }}

      - name: Install k6
        run: |
          if ! command -v k6 &>/dev/null; then
            curl -fsSL https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
            echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
            sudo apt-get update && sudo apt-get install -y k6
          fi

      - name: Run k6 smoke test
        run: k6 run --vus 1 --duration 30s --out json=k6-results.json performance/k6-api-response-times.js || true

      - name: Compare against baselines
        run: |
          if [ ! -f k6-results.json ]; then echo "No k6 results, skipping comparison"; exit 0; fi
          node -e "
          const fs = require('fs');
          const baselines = JSON.parse(fs.readFileSync('performance/baselines.json'));
          const lines = fs.readFileSync('k6-results.json', 'utf8').trim().split('\n');
          const metrics = {};
          for (const line of lines) {
            try {
              const obj = JSON.parse(line);
              if (obj.type === 'Point' && obj.metric) metrics[obj.metric] = obj;
            } catch {}
          }
          const p95 = metrics['http_req_duration']?.data?.value ?? null;
          const errRate = metrics['http_req_failed']?.data?.value ?? null;
          const results = [];
          if (p95 !== null) {
            const pass = p95 <= baselines.api.p95_ms.threshold;
            results.push({ metric: 'API p95 ms', value: p95.toFixed(1), threshold: baselines.api.p95_ms.threshold, pass });
          }
          if (errRate !== null) {
            const pct = errRate * 100;
            const pass = pct <= baselines.api.error_rate_pct.threshold;
            results.push({ metric: 'Error rate %', value: pct.toFixed(2), threshold: baselines.api.error_rate_pct.threshold, pass });
          }
          fs.writeFileSync('api-performance-results.json', JSON.stringify(results, null, 2));
          console.log(JSON.stringify(results, null, 2));
          if (results.some(r => !r.pass)) process.exit(1);
          "

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-performance-results
          path: |
            k6-results.json
            api-performance-results.json

  performance-report:
    name: Performance Report
    runs-on: ubuntu-latest
    needs: [contract-benchmarks, api-performance]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: contract-performance-results
          path: artifacts/contract
        continue-on-error: true

      - uses: actions/download-artifact@v4
        with:
          name: api-performance-results
          path: artifacts/api
        continue-on-error: true

      - name: Generate summary
        run: |
          baselines=$(cat performance/baselines.json)
          echo "## Performance Baseline Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Contract Instruction Counts" >> $GITHUB_STEP_SUMMARY
          echo "| Operation | Baseline | Threshold | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|----------|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          for key in participant_registration_instructions waste_registration_instructions waste_transfer_instructions incentive_creation_instructions reward_distribution_instructions; do
            baseline=$(echo "$baselines" | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>console.log(JSON.parse(d).contract['$key'].baseline))")
            threshold=$(echo "$baselines" | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>console.log(JSON.parse(d).contract['$key'].threshold))")
            label=$(echo "$key" | sed 's/_/ /g')
            echo "| $label | $baseline | $threshold | ⬜ pending |" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### API Metrics" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Baseline | Threshold | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|----------|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          if [ -f artifacts/api/api-performance-results.json ]; then
            node -e "
            const results = JSON.parse(require('fs').readFileSync('artifacts/api/api-performance-results.json'));
            for (const r of results) {
              const icon = r.pass ? '✅' : '❌';
              console.log('| ' + r.metric + ' | - | ' + r.threshold + ' | ' + icon + ' ' + r.value + ' |');
            }
            " >> $GITHUB_STEP_SUMMARY
          else
            echo "| p95 ms | 300 | 500 | ⬜ skipped |" >> $GITHUB_STEP_SUMMARY
            echo "| p99 ms | 700 | 1000 | ⬜ skipped |" >> $GITHUB_STEP_SUMMARY
            echo "| error rate % | 1 | 5 | ⬜ skipped |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Baselines defined in \`performance/baselines.json\`. See [PERFORMANCE_BASELINE.md](docs/PERFORMANCE_BASELINE.md) for details._" >> $GITHUB_STEP_SUMMARY
