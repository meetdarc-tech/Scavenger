# Security Scanning CI Workflow
# Issue #740: Automated security scanning in CI/CD pipeline
#
# Runs on: push to main/develop, all PRs, and weekly schedule
# Covers: SAST (Clippy + CodeQL), dependency audits, secret scanning

name: Security Scanning

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Weekly full scan every Monday at 02:00 UTC
    - cron: "0 2 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # 1. SAST — Rust (Clippy deny + cargo-audit)
  # ─────────────────────────────────────────────────────────────────────────────
  rust-sast:
    name: Rust SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Clippy (deny warnings + security lints)
        run: |
          cargo clippy --all-targets --all-features -- \
            -D warnings \
            -D clippy::unwrap_used \
            -D clippy::expect_used \
            -D clippy::panic \
            -D clippy::integer_arithmetic \
            -W clippy::pedantic

      - name: Install cargo-audit
        run: cargo install --locked cargo-audit@0.21.0

      - name: Dependency vulnerability audit (Rust)
        run: cargo audit --deny warnings

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. SAST — CodeQL (multi-language)
  # ─────────────────────────────────────────────────────────────────────────────
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:${{ matrix.language }}
          upload: true

  # ─────────────────────────────────────────────────────────────────────────────
  # 3. Dependency Scanning — npm (frontend, indexer, packages)
  # ─────────────────────────────────────────────────────────────────────────────
  npm-dependency-scan:
    name: npm Dependency Scan
    runs-on: ubuntu-latest
    strategy:
      matrix:
        workspace:
          - frontend
          - indexer
          - packages/scavenger-sdk
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ matrix.workspace }}/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix ${{ matrix.workspace }}

      - name: npm audit
        run: |
          npm audit --prefix ${{ matrix.workspace }} \
            --audit-level=high \
            --json > npm-audit-${{ matrix.workspace }}.json || true

      - name: Check for critical vulnerabilities
        run: |
          CRITICAL=$(jq '.metadata.vulnerabilities.critical // 0' \
            npm-audit-${{ matrix.workspace }}.json)
          HIGH=$(jq '.metadata.vulnerabilities.high // 0' \
            npm-audit-${{ matrix.workspace }}.json)
          echo "Critical: $CRITICAL, High: $HIGH"
          if [ "$CRITICAL" -gt "0" ]; then
            echo "::error::Critical npm vulnerabilities found in ${{ matrix.workspace }}"
            exit 1
          fi

      - name: Upload npm audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit-${{ matrix.workspace }}
          path: npm-audit-${{ matrix.workspace }}.json
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  # 4. Secret Scanning (gitleaks)
  # ─────────────────────────────────────────────────────────────────────────────
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for gitleaks

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}  # optional for SARIF upload

      - name: Upload gitleaks SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results.sarif
        continue-on-error: true  # SARIF upload is best-effort

  # ─────────────────────────────────────────────────────────────────────────────
  # 5. Container Scanning (Trivy)
  # ─────────────────────────────────────────────────────────────────────────────
  container-scan:
    name: Container Scanning
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          - context: frontend
            tag: scavngr-frontend
          - context: backend
            tag: scavngr-backend
          - context: indexer
            tag: scavngr-indexer
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ matrix.image.tag }}:${{ github.sha }} \
            ./${{ matrix.image.context }}

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ matrix.image.tag }}:${{ github.sha }}
          format: sarif
          output: trivy-${{ matrix.image.tag }}.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-${{ matrix.image.tag }}.sarif
          category: container-${{ matrix.image.tag }}

  # ─────────────────────────────────────────────────────────────────────────────
  # 6. Security Policy Enforcement (OSSF Scorecard)
  # ─────────────────────────────────────────────────────────────────────────────
  scorecard:
    name: OSSF Scorecard
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'schedule'
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: scorecard.sarif
          results_format: sarif
          publish_results: true

      - name: Upload Scorecard SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: scorecard.sarif
          category: ossf-scorecard

  # ─────────────────────────────────────────────────────────────────────────────
  # 7. Vulnerability Reporting — aggregate summary
  # ─────────────────────────────────────────────────────────────────────────────
  report:
    name: Security Report
    runs-on: ubuntu-latest
    needs:
      - rust-sast
      - npm-dependency-scan
      - secret-scan
    if: always()
    steps:
      - name: Download all audit artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: npm-audit-*
          merge-multiple: true

      - name: Generate summary
        run: |
          echo "## Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Rust SAST (Clippy + cargo-audit) | ${{ needs.rust-sast.result }} |" \
            >> $GITHUB_STEP_SUMMARY
          echo "| npm Dependency Scan | ${{ needs.npm-dependency-scan.result }} |" \
            >> $GITHUB_STEP_SUMMARY
          echo "| Secret Scanning (gitleaks) | ${{ needs.secret-scan.result }} |" \
            >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Scan triggered by: \`${{ github.event_name }}\` on \`${{ github.ref_name }}\`" \
            >> $GITHUB_STEP_SUMMARY

      - name: Fail if any critical check failed
        if: |
          needs.rust-sast.result == 'failure' ||
          needs.secret-scan.result == 'failure'
        run: |
          echo "::error::One or more critical security checks failed."
          exit 1
