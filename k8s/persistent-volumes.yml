apiVersion: v1
kind: PersistentVolume
metadata:
  name: scavenger-postgres-pv
  namespace: scavenger
  labels:
    app: scavenger
    component: postgres
spec:
  capacity:
    storage: 50Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: standard
  hostPath:
    path: /data/scavenger/postgres

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: scavenger-postgres-pvc
  namespace: scavenger
  labels:
    app: scavenger
    component: postgres
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
  storageClassName: standard

