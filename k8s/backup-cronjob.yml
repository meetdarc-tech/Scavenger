apiVersion: v1
kind: ConfigMap
metadata:
  name: backup-scripts
  namespace: default
data:
  backup-database.sh: |
    #!/bin/bash
    set -e
    BACKUP_DIR="/backups"
    TIMESTAMP=$(date +%Y%m%d_%H%M%S)
    BACKUP_FILE="${BACKUP_DIR}/postgres_${TIMESTAMP}.sql"
    
    mkdir -p ${BACKUP_DIR}
    
    pg_dump \
      -h ${POSTGRES_HOST} \
      -U ${POSTGRES_USER} \
      -F c \
      ${POSTGRES_DB} > ${BACKUP_FILE}
    
    # Upload to S3
    aws s3 cp ${BACKUP_FILE} s3://${S3_BACKUP_BUCKET}/db/
    
    # Keep only last 30 local copies
    find ${BACKUP_DIR} -name "postgres_*.sql" -mtime +30 -delete
    
    echo "Backup completed: ${BACKUP_FILE}"
  
  backup-contract-state.sh: |
    #!/bin/bash
    set -e
    BACKUP_DIR="/backups"
    TIMESTAMP=$(date +%Y%m%d_%H%M%S)
    BACKUP_FILE="${BACKUP_DIR}/contract_state_${TIMESTAMP}.json"
    
    mkdir -p ${BACKUP_DIR}
    
    soroban contract invoke \
      --id ${CONTRACT_ID} \
      --network ${SOROBAN_NETWORK} \
      --op get_metrics > ${BACKUP_FILE}
    
    aws s3 cp ${BACKUP_FILE} s3://${S3_BACKUP_BUCKET}/contract/
    
    echo "Contract state backup completed: ${BACKUP_FILE}"

---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: database-backup
  namespace: default
spec:
  schedule: "0 * * * *"  # Every hour
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: backup-sa
          containers:
          - name: postgres-backup
            image: postgres:15-alpine
            command:
            - /bin/sh
            - -c
            - |
              cat /scripts/backup-database.sh | bash
            env:
            - name: POSTGRES_HOST
              value: "postgres.default.svc.cluster.local"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: password
            - name: POSTGRES_DB
              value: "scavenger"
            - name: S3_BACKUP_BUCKET
              value: "scavenger-backups"
            - name: AWS_REGION
              value: "us-east-1"
            volumeMounts:
            - name: scripts
              mountPath: /scripts
            - name: backups
              mountPath: /backups
          volumes:
          - name: scripts
            configMap:
              name: backup-scripts
              defaultMode: 0755
          - name: backups
            emptyDir: {}
          restartPolicy: OnFailure

---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: contract-state-backup
  namespace: default
spec:
  schedule: "0 */6 * * *"  # Every 6 hours
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: backup-sa
          containers:
          - name: contract-backup
            image: node:20-alpine
            command:
            - /bin/sh
            - -c
            - |
              npm install -g soroban-cli && \
              cat /scripts/backup-contract-state.sh | bash
            env:
            - name: CONTRACT_ID
              valueFrom:
                configMapKeyRef:
                  name: contract-config
                  key: contract-id
            - name: SOROBAN_NETWORK
              value: "testnet"
            - name: S3_BACKUP_BUCKET
              value: "scavenger-backups"
            - name: AWS_REGION
              value: "us-east-1"
            volumeMounts:
            - name: scripts
              mountPath: /scripts
            - name: backups
              mountPath: /backups
          volumes:
          - name: scripts
            configMap:
              name: backup-scripts
              defaultMode: 0755
          - name: backups
            emptyDir: {}
          restartPolicy: OnFailure

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backup-sa
  namespace: default

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: backup-role
  namespace: default
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
  resourceNames: ["postgres-credentials"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backup-rolebinding
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: backup-role
subjects:
- kind: ServiceAccount
  name: backup-sa
  namespace: default
