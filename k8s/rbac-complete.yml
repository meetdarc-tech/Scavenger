apiVersion: v1
kind: ServiceAccount
metadata:
  name: scavenger
  namespace: scavenger

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: scavenger-role
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
- apiGroups: ["apps"]
  resources: ["deployments", "statefulsets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["batch"]
  resources: ["jobs", "cronjobs"]
  verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: scavenger-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: scavenger-role
subjects:
- kind: ServiceAccount
  name: scavenger
  namespace: scavenger

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: scavenger-pod-role
  namespace: scavenger
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch", "delete"]
- apiGroups: [""]
  resources: ["services"]
  verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: scavenger-pod-binding
  namespace: scavenger
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: scavenger-pod-role
subjects:
- kind: ServiceAccount
  name: scavenger
  namespace: scavenger
