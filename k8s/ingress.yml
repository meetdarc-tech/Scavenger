apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: scavenger-ingress
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - scavenger.app
    - api.scavenger.app
    secretName: scavenger-tls
  rules:
  - host: scavenger.app
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: scavenger-frontend
            port:
              number: 80
  - host: api.scavenger.app
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: scavenger-contract
            port:
              number: 80
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: scavenger-config
  namespace: default
data:
  stellar_network: "testnet"
  log_level: "info"
  metrics_enabled: "true"
---
apiVersion: v1
kind: Secret
metadata:
  name: scavenger-secrets
  namespace: default
type: Opaque
stringData:
  contract_id: "CHANGE_ME"
  admin_key: "CHANGE_ME"
  token_address: "CHANGE_ME"
