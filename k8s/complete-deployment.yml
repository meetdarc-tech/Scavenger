apiVersion: v1
kind: Namespace
metadata:
  name: scavenger

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scavenger-backend
  namespace: scavenger
  labels:
    app: scavenger-backend
    version: v1
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: scavenger-backend
  template:
    metadata:
      labels:
        app: scavenger-backend
        version: v1
    spec:
      serviceAccountName: scavenger
      containers:
      - name: backend
        image: YOUR_ECR_URI/scavenger-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: RUST_LOG
          value: "info"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: scavenger-secrets
              key: database-url
        - name: STELLAR_NETWORK
          value: "testnet"
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        volumeMounts:
        - name: config
          mountPath: /etc/config
        - name: logs
          mountPath: /var/log/scavenger
      volumes:
      - name: config
        configMap:
          name: scavenger-config
      - name: logs
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: scavenger-backend
  namespace: scavenger
  labels:
    app: scavenger-backend
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: scavenger-backend

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: scavenger-backend-hpa
  namespace: scavenger
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: scavenger-backend
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: scavenger-backend-pdb
  namespace: scavenger
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: scavenger-backend

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: scavenger-config
  namespace: scavenger
data:
  config.toml: |
    [server]
    host = "0.0.0.0"
    port = 8080
    
    [logging]
    level = "info"
    format = "json"

---
apiVersion: v1
kind: Secret
metadata:
  name: scavenger-secrets
  namespace: scavenger
type: Opaque
stringData:
  database-url: "postgresql://user:password@postgres:5432/scavenger"
