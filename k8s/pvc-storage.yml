apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: scavenger-storage
provisioner: ebs.csi.aws.com
parameters:
  type: gp3
  iops: "3000"
  throughput: "125"

---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: scavenger-data-pv
spec:
  capacity:
    storage: 100Gi
  accessModes:
    - ReadWriteOnce
  storageClassName: scavenger-storage
  awsElasticBlockStore:
    volumeID: vol-xxxxx
    fsType: ext4

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: scavenger-data-pvc
  namespace: scavenger
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: scavenger-storage
  resources:
    requests:
      storage: 50Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: scavenger-cache-pvc
  namespace: scavenger
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: scavenger-storage
  resources:
    requests:
      storage: 20Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: scavenger-logs-pvc
  namespace: scavenger
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: scavenger-storage
  resources:
    requests:
      storage: 10Gi
