apiVersion: helm.sh/v1
kind: Chart
metadata:
  name: scavenger
  version: 1.0.0
  appVersion: "1.0.0"
  description: Scavenger - Stellar Recycling Platform
---
apiVersion: v1
kind: Values
# Default values for scavenger Helm chart
replicaCount: 3

image:
  repository: ghcr.io/xoulomon/scavenger
  pullPolicy: Always
  tag: "latest"

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: scavenger.app
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: scavenger-tls
      hosts:
        - scavenger.app

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - scavenger-contract
          topologyKey: kubernetes.io/hostname

config:
  stellarNetwork: testnet
  logLevel: info
  metricsEnabled: true

secrets:
  contractId: ""
  adminKey: ""
  tokenAddress: ""
