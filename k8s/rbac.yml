apiVersion: v1
kind: Namespace
metadata:
  name: scavenger
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: scavenger
  namespace: scavenger
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: scavenger-role
  namespace: scavenger
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: scavenger-rolebinding
  namespace: scavenger
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: scavenger-role
subjects:
- kind: ServiceAccount
  name: scavenger
  namespace: scavenger
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: scavenger-pdb
  namespace: scavenger
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: scavenger-contract
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: scavenger-quota
  namespace: scavenger
spec:
  hard:
    requests.cpu: "10"
    requests.memory: "20Gi"
    limits.cpu: "20"
    limits.memory: "40Gi"
    pods: "100"
