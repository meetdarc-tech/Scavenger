apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: scavenger-ingress
  namespace: scavenger
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "100"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - scavenger.example.com
    secretName: scavenger-tls
  rules:
  - host: scavenger.example.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: scavenger-backend
            port:
              number: 80
      - path: /
        pathType: Prefix
        backend:
          service:
            name: scavenger-frontend
            port:
              number: 3000

---
apiVersion: v1
kind: Service
metadata:
  name: scavenger-frontend
  namespace: scavenger
  labels:
    app: scavenger-frontend
spec:
  type: ClusterIP
  ports:
  - port: 3000
    targetPort: 3000
    protocol: TCP
  selector:
    app: scavenger-frontend

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scavenger-frontend
  namespace: scavenger
spec:
  replicas: 2
  selector:
    matchLabels:
      app: scavenger-frontend
  template:
    metadata:
      labels:
        app: scavenger-frontend
    spec:
      containers:
      - name: frontend
        image: YOUR_ECR_URI/scavenger-frontend:latest
        ports:
        - containerPort: 3000
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 200m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
